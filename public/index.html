<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Readme Viewer</title>
  <link rel="stylesheet" href="/style.css">
  <script>
    // Apply theme BEFORE paint and disable transitions to prevent flash
    (function() {
      document.documentElement.classList.add('no-transition');
      var t = localStorage.getItem('theme');
      var a = localStorage.getItem('accent') || 'teal';
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      document.documentElement.setAttribute('data-accent', a);
      if (localStorage.getItem('sidebarCollapsed') === 'true') {
        document.documentElement.classList.add('sidebar-collapsed');
      }
      // Re-enable transitions after first paint
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          document.documentElement.classList.remove('no-transition');
        });
      });
    })();
  </script>
</head>
<body>
  <!-- Reading progress bar -->
  <div class="progress-bar" id="progress-bar"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">
          <span class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
          </span>
          <span>Readme Viewer</span>
        </h1>
        <div class="theme-controls">
          <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
            <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <div class="accent-picker-btn" id="accent-picker-btn" title="Choose accent color">
            <span class="accent-dot"></span>
            <div class="accent-dropdown" id="accent-dropdown">
              <button class="accent-option" data-accent="teal">
                <span class="accent-swatch" style="background:#0d9488"></span>Teal
              </button>
              <button class="accent-option" data-accent="indigo">
                <span class="accent-swatch" style="background:#6366f1"></span>Slate Blue
              </button>
              <button class="accent-option" data-accent="green">
                <span class="accent-swatch" style="background:#059669"></span>Forest Green
              </button>
              <button class="accent-option" data-accent="neutral">
                <span class="accent-swatch" style="background:#6b7280"></span>Neutral
              </button>
              <button class="accent-option" data-accent="purple">
                <span class="accent-swatch" style="background:#7c3aed"></span>Purple
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="search-wrapper">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search files..." />
          <button class="search-mode-btn" id="search-mode-btn" title="Toggle content search">
            <svg class="mode-file" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            </svg>
            <svg class="mode-text" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
            </svg>
          </button>
        </div>
        <div id="text-search-results" class="text-search-results hidden"></div>
      </div>

      <div id="recents-section" class="recents-section">
        <div class="recents-header">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          Recent
        </div>
        <div id="recents-list"></div>
      </div>
      <nav id="file-list"></nav>

      <div class="sidebar-footer">
        <span id="file-count"></span>
      </div>
    </aside>
    <div class="sidebar-resize" id="sidebar-resize"></div>
    <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
      <svg class="toggle-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
      <svg class="toggle-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><polyline points="14 9 17 12 14 15"/>
      </svg>
    </button>

    <main class="content">
      <!-- Top bar: breadcrumb + file info -->
      <div class="content-topbar" id="content-topbar">
        <div class="breadcrumb" id="breadcrumb"></div>
      </div>

      <div id="translate-bar" class="translate-bar hidden">
        <span class="translate-info">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="m2 12 20 0"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span id="detected-lang">Non-English content detected</span>
        </span>
        <button id="translate-btn" class="translate-btn">Translate to English</button>
      </div>

      <div class="content-wrapper">
        <article id="markdown-body" class="markdown-body">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              <line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
            <p>Select a file from the sidebar</p>
            <span>Browse your documentation</span>
          </div>
        </article>
        <nav class="toc" id="toc">
          <div class="toc-title">On this page</div>
          <ul class="toc-list" id="toc-list"></ul>
        </nav>
      </div>

      <!-- Scroll buttons -->
      <div class="scroll-buttons">
        <button id="scroll-top-btn" class="scroll-btn" title="Scroll to top">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"/>
          </svg>
        </button>
        <button id="scroll-bottom-btn" class="scroll-btn" title="Scroll to bottom">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="/lib/marked.min.js"></script>
  <script src="/lib/mermaid.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
